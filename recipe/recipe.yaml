schema_version: 1

context:
  name: trackio
  version: "0.24.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/gradio-app/trackio/archive/refs/tags/trackio@${{ version }}.tar.gz
  sha256: 51ea92bdc1da720522f3d0b5e52452d8265d809a6daaafd6ab3a062c94b36215

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - trackio = trackio.cli:main
  number: 0

requirements:
  host:
    - python  ${{ python_min }}.*
    - pip
    - hatchling
    - nodejs
  run:
    - python  >=${{ python_min }}
    - huggingface_hub <2.0.0
    - gradio-client >=2.0.0,<3.0.0
    - starlette <2.0.0
    - python-multipart >=0.0.9,<1.0.0
    - uvicorn >=0.30.0,<1.0.0
    - numpy <3.0.0
    - pillow <13.0.0
    - orjson >=3.0,<4.0.0
    - pydub <1.0.0
  run_constraints:
    - tbparse ==0.0.9
    - tensorboardx >=2.0.0,<3.0.0
    - nvidia-ml-py >=12.0.0
    - pyarrow >=21.0
    - mcp >=1.0.0,<2.0.0

tests:
  - script:
      - trackio --help
  - python:
      python_version: ${{ python_min }}.*
      pip_check: true
      imports:
        - trackio

about:
  homepage: https://github.com/gradio-app/trackio
  summary: 'A lightweight, local-first and free experiment tracking library built by Hugging Face'
  description: |
    trackio is a lightweight, free experiment tracking Python library built by Hugging Face.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/gradio-app/trackio

extra:
  recipe-maintainers:
    - flferretti
