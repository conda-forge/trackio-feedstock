schema_version: 1

context:
  name: trackio
  version: "0.19.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/gradio-app/trackio/archive/refs/tags/trackio@${{ version }}.tar.gz
  sha256: 613b06a05e0ba0ef7410f634da5083f915d27cc88416488e8e23e6a5842b8dbf

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - trackio = trackio.cli:main
  number: 0

requirements:
  host:
    - python  ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python  >=${{ python_min }}
    - pandas <3.0.0
    - huggingface_hub <2.0.0
    - gradio >=6.8.0,<7.0.0
    - numpy <3.0.0
    - pillow <12.0.0
    - orjson >=3.0,<4.0.0
    - pydub <1.0.0
    - plotly >=6.0.0,<7.0.0
  run_constraints:
    - tbparse ==0.0.9
    - tensorboardx >=2.0.0,<3.0.0
    - nvidia-ml-py >=12.0.0
    - pyarrow >=21.0

tests:
  - script:
      - trackio --help
  - python:
      python_version: ${{ python_min }}.*
      pip_check: true
      imports:
        - trackio

about:
  homepage: https://github.com/gradio-app/trackio
  summary: 'A lightweight, local-first and free experiment tracking library built by Hugging Face'
  description: |
    trackio is a lightweight, free experiment tracking Python library built by Hugging Face.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/gradio-app/trackio

extra:
  recipe-maintainers:
    - flferretti
